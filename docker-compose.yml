services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: helpdesk_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: helpdesk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d helpdesk_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Cache & Rate Limiter
  redis:
    image: redis:7-alpine
    container_name: helpdesk_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: helpdesk_rabbitmq
    restart: always
    ports:
      - "5672:5672"       # AMQP protocol
      - "15672:15672"     # Management dashboard UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Next.js App Router Frontend & API Server
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: helpdesk_client
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/helpdesk_db?schema=public
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - JWT_SECRET=dev-jwt-secret-key-at-least-32-chars-long-12345678
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # 5. Socket.IO Websocket Server
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: helpdesk_server
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/helpdesk_db?schema=public
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - JWT_SECRET=dev-jwt-secret-key-at-least-32-chars-long-12345678
      - SOCKET_PORT=3001
    command: npm start
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # 6. RabbitMQ Background Consumer Workers
  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: helpdesk_worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/helpdesk_db?schema=public
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - JWT_SECRET=dev-jwt-secret-key-at-least-32-chars-long-12345678
      - SEND_EMAIL_ENABLED=true
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    command: node dist/workers/runAll.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
